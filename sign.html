<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="signup.css">
  <style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #74ABE2, #5563DE);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

.signup-box {
  background: #fff;
  border-radius: 15px;
  padding: 40px 30px;
  box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
  text-align: center;
}

.signup-box h1 {
  margin-bottom: 10px;
  color: #333;
}

.signup-box p {
  color: #666;
  margin-bottom: 20px;
}

.input-group {
  text-align: left;
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  color: #333;
  margin-bottom: 5px;
  font-weight: 500;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  outline: none;
  transition: 0.3s;
}

.input-group input:focus {
  border-color: #5563DE;
  box-shadow: 0 0 5px rgba(85, 99, 222, 0.5);
}

button {
  width: 100%;
  padding: 12px;
  background: #5563DE;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #3949AB;
}

.login-link {
  margin-top: 15px;
  color: #333;
}

.login-link a {
  color: #5563DE;
  text-decoration: none;
  font-weight: 600;
}

.login-link a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
  
  <div class="container">
    <div class="signup-box">
      <h1>Create Account</h1>
      <p>Join us today! It takes only a few steps.</p>

      <form action="index.html" method="get">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Re-enter password" required>
        </div>

        <button type="submit">Sign Up</button>

        <p class="login-link">Already have an account? <a href="#">Login here</a></p>
        <p class="skip"><a href="index.html">Skip for now</a></p>
      </form>
    </div>
  </div>
</body>
</html>
